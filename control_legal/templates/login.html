<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Jurídico - Ingreso</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fondo con imagen y overlay oscuro como en 1000054027_3.png */
        .bg-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                              url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card h2 {
            color: #333;
            font-weight: 300;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-control {
            border-radius: 5px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }

        .btn-login {
            background-color: #2c3e50; /* El azul oscuro del modelo */
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #1a252f;
            color: white;
        }

        .brand-header {
            padding: 20px 40px;
            color: white;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="bg-image">
    <!-- Encabezado superior del modelo -->
    <div class="brand-header">
        <i class="bi bi-bank2 fs-1 me-3"></i>
        <h3 class="mb-0 text-uppercase fw-bold" style="letter-spacing: 2px;">Consultorio Jurídico Popular</h3>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h2>Sistema Jurídico</h2>
            
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger small py-2">{{ message }}</div>
            {% endfor %}
            {% endif %} 
    
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                
                <button type="submit" class="btn-login mt-2">Ingresar</button>
            </form>

            <div class="mt-4">
                <a href="#" class="text-muted text-decoration-none small">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
