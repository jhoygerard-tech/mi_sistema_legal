<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Cliente — LexNova Bolivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ── Contenedor principal ── */
        .login-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Video de fondo ── */
        .video-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 0;
        }

        /* ── Overlay sutil para no apagar el neón del video ── */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(10, 18, 40, 0.3) 0%,   
                rgba(20, 40, 90, 0.2) 100%   
            );
            z-index: 1;
        }

        /* ── La Tarjeta modificada para que inicie invisible ── */
        .portal-card {
            position: relative;
            z-index: 2; /* Se posiciona sobre el video */
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
            
            /* Nuevas propiedades para la animación de entrada */
            opacity: 0;
            transform: translateY(24px);
            pointer-events: none;
            transition: opacity .8s ease, transform .8s ease;
        }

        /* Nueva clase que activará JavaScript cuando termine el video */
        .portal-card.mostrar-login {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .logo { font-size: 1.4rem; font-weight: 700; color: #1a2744; }
        .logo span { color: #2e59a7; }
        
        .codigo-input {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: .4rem;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 14px;
        }
        .codigo-input:focus {
            border-color: #2e59a7;
            box-shadow: 0 0 0 3px rgba(46,89,167,.15);
        }
        .btn-ingresar {
            background: linear-gradient(135deg, #1a2744, #2e59a7);
            color: #fff; border: none; border-radius: 12px;
            padding: 14px; font-size: 1rem; font-weight: 600;
            width: 100%; transition: opacity .2s;
        }
        .btn-ingresar:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body>

<div class="login-wrapper">

    <video id="fondo-video"
           class="video-bg"
           autoplay
           muted
           playsinline
           preload="auto">
        <source src="{% static 'video/lv_0_20260530183251.mp4' %}" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div id="cuadro-login" class="portal-card">
        <div class="text-center mb-4">
            <i class="bi bi-bank fs-1 text-primary d-block mb-2"></i>
            <div class="logo">Lex<span>Nova</span> Bolivia</div>
            <p class="text-muted mt-1 mb-0" style="font-size:.85rem;">Portal de seguimiento de casos</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:.875rem;border-radius:10px;">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary mb-2" style="font-size:.85rem;">
                    Ingresa tu código de acceso
                </label>
                <input type="text" name="codigo" class="form-control codigo-input"
                       placeholder="XXXXXXXX" maxlength="8" autocomplete="off"
                       autofocus required>
                <div class="text-muted mt-2" style="font-size:.78rem;">
                    <i class="bi bi-info-circle me-1"></i>
                    Tu abogado te proporcionó este código de 8 caracteres.
                </div>
            </div>
            <button type="submit" class="btn btn-ingresar">
                <i class="bi bi-arrow-right-circle me-2"></i> Ver mi caso
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">
                ¿Eres abogado o personal del bufete?
                <a href="{% url 'login' %}" class="text-primary text-decoration-none">Ingresar aquí</a>
            </small>
        </div>
    </div>

</div>

<script>
    const video = document.getElementById('fondo-video');
    const login = document.getElementById('cuadro-login');

    video.addEventListener('ended', function() {
        video.pause(); // Congela el video en el último fotograma
        login.classList.add('mostrar-login'); // Despliega la tarjeta elegantemente
    });
</script>

</body>
</html>
