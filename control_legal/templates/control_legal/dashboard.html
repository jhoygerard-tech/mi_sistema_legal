<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-resumen { border: none; border-radius: 15px; color: white; }
        .bg-azul { background: #2e59a7; }
        .bg-verde { background: #28a745; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2 class="mb-4">Panel de Control Legal</h2>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card card-resumen bg-azul p-4 shadow">
                    <h3>Total de Casos</h3>
                    <h1>{{ total }}</h1>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card card-resumen bg-verde p-4 shadow">
                    <h3>Casos Activos</h3>
                    <h1>{{ activos }}</h1>
                </div>
            </div>
        </div>

        <div class="text-center">
            <a href="{% url 'listar_casos' %}" class="btn btn-outline-primary btn-lg">Ver Listado Completo</a>
            <a href="{% url 'registrar_caso' %}" class="btn btn-primary btn-lg">Registrar Nuevo Caso</a>
        </div>
    </div>
</body>
</html>
