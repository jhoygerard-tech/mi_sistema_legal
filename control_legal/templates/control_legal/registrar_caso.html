<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Caso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #2c3e50; color: white; }
        .card-header { background-color: #ffffff; border-bottom: 2px solid #2c3e50; }
    </style>
</head>
<body>

<!-- Navbar Estilizado basado en 1000054027_3.png -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3 mb-4" style="background-color: #2c3e50 !important;">
    <div class="container-fluid px-4">
        <!-- Lado Izquierdo: Logo y Títulos -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'listar_casos' %}">
            <i class="bi bi-bank2 fs-2 me-3 text-light opacity-75"></i>
            <div>
                <span class="d-block fs-4 fw-bold mb-0 lh-1">Sistema Jurídico</span>
                <small class="text-white-50 fw-light" style="font-size: 0.75rem;">Consultorio Jurídico Popular - El Alto</small>
            </div>
        </a>

        <!-- Lado Derecho: Acciones de Usuario e Iconos -->
        <div class="d-flex align-items-center">
            <div class="d-none d-md-flex me-4">
                <a href="#" class="text-white-50 mx-2"><i class="bi bi-person fs-5"></i></a>
                <a href="#" class="text-white-50 mx-2"><i class="bi bi-chat-left-dots fs-5"></i></a>
            </div>
            <button class="btn btn-outline-light border-0 opacity-75" type="button">
                <i class="bi bi-list fs-3"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5 class="m-0 text-dark">Registrar Nuevo Caso</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    {% for field in form %}
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                <div class="mt-3 text-end">
                    <button type="submit" class="btn btn-primary px-4">Guardar Caso</button>
                    <a href="#" class="btn btn-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
