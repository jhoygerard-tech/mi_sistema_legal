<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <style>
        @page { size: letter; margin: 1.5cm; }
        body { font-family: 'Helvetica', sans-serif; font-size: 11px; }
        .titulo { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .subtitulo { text-align: center; margin-bottom: 20px; color: #555; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #2c3e50; color: white; padding: 10px; border: 1px solid #2c3e50; }
        td { padding: 8px; border: 1px solid #bdc3c7; text-align: center; }
        .footer { text-align: right; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <div class="titulo">CONSULTORIO JURÍDICO POPULAR</div>
    <div class="subtitulo">Reporte de Procesos Activos - {{ fecha|date:"d/m/Y H:i" }}</div>

    <table>
        <thead>
            <tr>
                <th>NUREJ</th>
                <th>Cliente</th>
                <th>Materia</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for caso in casos %}
            <tr>
                <td>{{ caso.nurej }}</td>
                <td>{{ caso.cliente }}</td>
                <td>{{ caso.materia }}</td>
                <td>Activo</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="footer">
        Generado por: {{ request.user.username }}
    </div>
</body>
</html>
